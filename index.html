<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pieśni WBS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #ui-layer {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        select {
            padding: 10px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            flex-grow: 1;
            min-width: 0;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-load { background: #28a745; }
        .btn-clear { background: #6c757d; }

        #display {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            position: relative; /* Ważne dla pozycjonowania stopki */
            overflow: hidden;
        }

        #lyrics-container {
            width: 100%;
        }

        .verse {
            font-weight: 600;
            line-height: 1.4;
            white-space: pre-wrap;
            animation: fadeIn 0.2s ease-out;
            font-size: 8vh; 
            padding: 0 40px;
            padding-bottom: 100px; /* Duży margines, by tekst nie zasłonił stopki */
        }

        /* STOPKA - Wersja ultra-widoczna */
        #section-footer {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 20px; /* Stały rozmiar w pikselach dla pewności */
            color: #ffffff; /* Czysty biały */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            background: rgba(50, 50, 50, 0.8); /* Ciemne, wyraźne tło */
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #444;
            z-index: 9999; /* Zawsze na wierzchu */
            display: block !important; /* Wymuszenie wyświetlania */
            min-width: 100px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Poprawki mobilne */
        @media (max-width: 768px) {
            #ui-layer {
                flex-wrap: wrap;
            }
            select { width: 100%; order: 1; }
            .btn-load, .btn-clear { flex: 1; order: 2; }

            .verse {
                font-size: 4.5vh; 
                padding: 0 15px;
                padding-bottom: 120px; /* Jeszcze więcej miejsca na dole w komórce */
            }

            #section-footer {
                font-size: 18px;
                bottom: 20px; /* Wyżej, żeby paski nawigacji Samsunga go nie zakryły */
                right: 50%;
                transform: translateX(50%); /* Wyśrodkowanie na komórce dla lepszej widoczności */
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <select id="song-select">
        <option value="">Ładowanie...</option>
    </select>
    <button class="btn-load" onclick="loadSong()">Załaduj</button>
    <button class="btn-clear" onclick="clearDisplay()">Wyczyść</button>
</div>

<div id="display" onclick="nextVerse()">
    <div id="lyrics-container">
        <div class="verse">Wybierz z listy</div>
    </div>
    <div id="section-footer"></div>
</div>

<script>
    let verses = [];
    let sectionNames = [];
    let currentVerseIndex = 0;

    async function init() {
        try {
            const response = await fetch('lista.txt');
            const text = await response.text();
            const files = text.split(/\r?\n/).filter(line => line.trim() !== '');
            const select = document.getElementById('song-select');
            select.innerHTML = '<option value="">-- Wybierz pieśń --</option>';
            files.forEach(fileName => {
                const option = document.createElement('option');
                option.value = 'piesni/' + fileName.trim();
                option.textContent = fileName.replace('.xml', '').replace(/_/g, ' ');
                select.appendChild(option);
            });
        } catch (err) { console.error(err); }
    }

    async function loadSong() {
        const url = document.getElementById('song-select').value;
        if (!url) return;
        try {
            const response = await fetch(url);
            const str = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(str, "text/xml");
            const xmlVerses = xmlDoc.getElementsByTagName("verse");
            
            verses = [];
            sectionNames = [];

            for (let v of xmlVerses) {
                const name = v.getAttribute("name") || "";
                const linesNode = v.getElementsByTagName("lines")[0];
                if (linesNode) {
                    let text = "";
                    for (let node of linesNode.childNodes) {
                        if (node.nodeType === 3) text += node.nodeValue;
                        else if (node.nodeName === "br") text += "\n";
                    }
                    if (text.trim()) {
                        verses.push(text.trim());
                        sectionNames.push(translateSectionName(name));
                    }
                }
            }
            currentVerseIndex = 0;
            renderVerse();
        } catch (err) { alert("Błąd XML"); }
    }

    function translateSectionName(name) {
        if (!name) return "";
        let n = name.toLowerCase();
        if (n.startsWith('v')) return "Zwrotka " + n.substring(1);
        if (n.startsWith('c')) return "Refren " + n.substring(1);
        if (n.startsWith('b')) return "Bridge " + n.substring(1);
        if (n.startsWith('p')) return "Pre-refren " + n.substring(1);
        return name;
    }

    function renderVerse() {
        const container = document.getElementById('lyrics-container');
        const footer = document.getElementById('section-footer');
        if (verses.length > 0) {
            container.innerHTML = `<div class="verse">${verses[currentVerseIndex]}</div>`;
            footer.textContent = sectionNames[currentVerseIndex];
            footer.style.display = "block"; // Wymuszenie pokazania
        }
    }

    function clearDisplay() {
        document.getElementById('lyrics-container').innerHTML = "";
        document.getElementById('section-footer').textContent = "";
        document.getElementById('section-footer').style.display = "none";
    }

    function nextVerse() {
        if (verses.length === 0) return;
        currentVerseIndex = (currentVerseIndex + 1) % verses.length;
        renderVerse();
    }

    function prevVerse() {
        if (verses.length === 0) return;
        currentVerseIndex = (currentVerseIndex - 1 + verses.length) % verses.length;
        renderVerse();
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowRight' || e.code === 'ArrowDown') { e.preventDefault(); nextVerse(); }
        else if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') prevVerse();
        else if (e.code === 'Escape' || e.code === 'KeyB') clearDisplay();
    });

    let touchstartX = 0;
    const displayZone = document.getElementById('display');
    displayZone.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
    displayZone.addEventListener('touchend', e => {
        let touchendX = e.changedTouches[0].screenX;
        if (touchendX < touchstartX - 50) nextVerse();
        if (touchendX > touchstartX + 50) prevVerse();
    }, {passive: true});

    init();
</script>
</body>
</html>
