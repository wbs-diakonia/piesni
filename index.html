<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pieśni WBS</title>
    <style>
        * { box-sizing: border-box; } /* Bardzo ważne dla telefonów */

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Sztywna wysokość ekranu */
            width: 100vw;
            overflow: hidden;
        }

        #ui-layer {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
            z-index: 1000;
            flex-shrink: 0; /* Menu nie może się ścisnąć */
        }

        /* Ustawienia dla wyświetlacza */
        #display {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            overflow: hidden;
            /* Kluczowe dla Samsunga S24: */
            height: calc(100vh - 60px); 
        }

        .verse {
            font-weight: 600;
            line-height: 1.3;
            white-space: pre-wrap;
            animation: fadeIn 0.2s ease-out;
            font-size: 8vh;
            width: 100%;
            /* Margines od dołu, by tekst nie wszedł pod stopkę */
            padding-bottom: 15vh; 
        }

        /* STOPKA - Zmieniona pozycja, by zawsze była widoczna */
        #section-footer {
            position: absolute;
            bottom: 20px; /* Wyżej od krawędzi */
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(60, 60, 60, 0.9);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #555;
            z-index: 9999;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Poprawki pod Brave / Mobile */
        @media (max-width: 768px) {
            #ui-layer { flex-wrap: wrap; }
            select { width: 100%; order: 1; font-size: 16px; }
            button { flex: 1; order: 2; font-size: 14px; }
            
            .verse {
                font-size: 4.5vh;
                padding-bottom: 80px;
            }
            
            #section-footer {
                bottom: 15px; /* Jeszcze wyżej na komórce */
                font-size: 14px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <select id="song-select">
        <option value="">Ładowanie...</option>
    </select>
    <button class="btn-load" style="background:#28a745" onclick="loadSong()">Załaduj</button>
    <button class="btn-clear" style="background:#6c757d" onclick="clearDisplay()">Wyczyść</button>
</div>

<div id="display" onclick="nextVerse()">
    <div id="lyrics-container">
        <div class="verse">Wybierz z listy</div>
    </div>
    <div id="section-footer"></div>
</div>

<script>
    // Tu wstaw całą dotychczasową sekcję SCRIPT (funkcje init, loadSong, itd.)
    // Pamiętaj tylko, by w funkcji renderVerse() dopisać na końcu:
    // document.getElementById('section-footer').style.display = "block";
    
    // ... (reszta Twojego działającego skryptu) ...
    
    let verses = [];
    let sectionNames = [];
    let currentVerseIndex = 0;

    async function init() {
        try {
            const response = await fetch('lista.txt');
            const text = await response.text();
            const files = text.split(/\r?\n/).filter(line => line.trim() !== '');
            const select = document.getElementById('song-select');
            select.innerHTML = '<option value="">-- Wybierz pieśń --</option>';
            files.forEach(fileName => {
                const option = document.createElement('option');
                option.value = 'piesni/' + fileName.trim();
                option.textContent = fileName.replace('.xml', '').replace(/_/g, ' ');
                select.appendChild(option);
            });
        } catch (err) { console.error(err); }
    }

    async function loadSong() {
        const url = document.getElementById('song-select').value;
        if (!url) return;
        try {
            const response = await fetch(url);
            const str = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(str, "text/xml");
            const xmlVerses = xmlDoc.getElementsByTagName("verse");
            verses = []; sectionNames = [];
            for (let v of xmlVerses) {
                const name = v.getAttribute("name") || "";
                const linesNode = v.getElementsByTagName("lines")[0];
                if (linesNode) {
                    let txt = "";
                    for (let node of linesNode.childNodes) {
                        if (node.nodeType === 3) txt += node.nodeValue;
                        else if (node.nodeName === "br") txt += "\n";
                    }
                    if (txt.trim()) {
                        verses.push(txt.trim());
                        sectionNames.push(translateSectionName(name));
                    }
                }
            }
            currentVerseIndex = 0;
            renderVerse();
        } catch (err) { alert("Błąd XML"); }
    }

    function translateSectionName(name) {
        if (!name) return "";
        let n = name.toLowerCase();
        if (n.startsWith('v')) return "Zwrotka " + n.substring(1);
        if (n.startsWith('c')) return "Refren " + n.substring(1);
        if (n.startsWith('b')) return "Bridge " + n.substring(1);
        if (n.startsWith('p')) return "Pre-refren " + n.substring(1);
        return name;
    }

    function renderVerse() {
        const container = document.getElementById('lyrics-container');
        const footer = document.getElementById('section-footer');
        if (verses.length > 0) {
            container.innerHTML = `<div class="verse">${verses[currentVerseIndex]}</div>`;
            footer.textContent = sectionNames[currentVerseIndex];
            footer.style.display = "block";
        }
    }

    function clearDisplay() {
        document.getElementById('lyrics-container').innerHTML = '<div class="verse"> </div>';
        document.getElementById('section-footer').textContent = "";
        document.getElementById('section-footer').style.display = "none";
    }

    function nextVerse() {
        if (verses.length === 0) return;
        currentVerseIndex = (currentVerseIndex + 1) % verses.length;
        renderVerse();
    }

    function prevVerse() {
        if (verses.length === 0) return;
        currentVerseIndex = (currentVerseIndex - 1 + verses.length) % verses.length;
        renderVerse();
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowRight' || e.code === 'ArrowDown') { e.preventDefault(); nextVerse(); }
        else if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') prevVerse();
        else if (e.code === 'Escape' || e.code === 'KeyB') clearDisplay();
    });

    let touchstartX = 0;
    const displayZone = document.getElementById('display');
    displayZone.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
    displayZone.addEventListener('touchend', e => {
        let touchendX = e.changedTouches[0].screenX;
        if (touchendX < touchstartX - 50) nextVerse();
        if (touchendX > touchstartX + 50) prevVerse();
    }, {passive: true});

    init();
</script>

</body>
</html>
