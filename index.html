<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pieśni WBS</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #ui-layer {
            padding: 8px;
            background: #1a1a1a;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        #song-select {
            flex: 1 1 100%;
            padding: 8px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .controls-row {
            display: flex;
            width: 100%;
            gap: 6px;
        }

        button {
            padding: 8px 12px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
        }

        .btn-toggle { background: #28a745; }
        
        #section-select {
            flex: 0 1 110px; /* Nieco szerszy, by zmieścić nazwy typu v1a */
            background: #444;
            color: #ffca28;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            padding: 5px;
        }

        #display {
            flex-grow: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            padding: 10px 20px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        #lyrics-container {
            width: 100%;
            margin-top: 20px;
        }

        .verse {
            font-weight: 600;
            line-height: 1.2;
            white-space: pre-wrap;
            animation: fadeIn 0.2s ease-out;
            font-size: 3.8vh; 
            width: 100%;
        }

        .hidden { visibility: hidden; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (min-width: 769px) {
            #ui-layer { flex-wrap: nowrap; }
            #song-select { flex: 2; }
            .controls-row { flex: 1; width: auto; }
            .verse { font-size: 7vh; line-height: 1.4; }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <select id="song-select" onchange="loadSong()">
        <option value="">Ładowanie...</option>
    </select>
    <div class="controls-row">
        <button id="btn-toggle" class="btn-toggle" onclick="toggleDisplay()">Ukryj</button>
        <select id="section-select" onchange="jumpToSection(this.value)">
            <option value="">---</option>
        </select>
    </div>
</div>

<div id="display" onclick="handleTap(event)">
    <div id="lyrics-container">
        <div id="verse-text" class="verse"></div>
    </div>
</div>

<script>
    let versesList = []; // Finalna lista tekstów do wyświetlenia
    let sectionLabelsList = []; // Finalna lista etykiet (np. Zw 1a)
    let currentVerseIndex = 0;
    let isHidden = false;

    const sectionMap = {
        'v': 'Zwr',
        'c': 'Ref',
        'b': 'Bri',
        'p': 'Pre',
        'i': 'Int',
        'e': 'Zak'
    };

    async function init() {
        try {
            const response = await fetch('lista.txt');
            const text = await response.text();
            const files = text.split(/\r?\n/).filter(line => line.trim() !== '');
            const select = document.getElementById('song-select');
            select.innerHTML = '<option value="">-- Wybierz pieśń --</option>';
            files.forEach(fileName => {
                const option = document.createElement('option');
                option.value = 'piesni/' + fileName.trim();
                option.textContent = fileName.replace('.xml', '').replace(/_/g, ' ');
                select.appendChild(option);
            });
        } catch (err) { console.error(err); }
    }

    async function loadSong() {
        const url = document.getElementById('song-select').value;
        if (!url) return;
        try {
            const response = await fetch(url);
            const str = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(str, "text/xml");
            
            // 1. Mapujemy wszystkie dostępne sekcje z pliku do obiektu pomocniczego
            const availableSections = {};
            const xmlVerses = xmlDoc.getElementsByTagName("verse");
            for (let v of xmlVerses) {
                const name = v.getAttribute("name");
                const linesNode = v.getElementsByTagName("lines")[0];
                if (linesNode) {
                    let txt = "";
                    for (let node of linesNode.childNodes) {
                        if (node.nodeType === 3) txt += node.nodeValue;
                        else if (node.nodeName === "br") txt += "\n";
                    }
                    availableSections[name.toLowerCase()] = txt.trim();
                }
            }

            // 2. Sprawdzamy czy jest zdefiniowana kolejność (verseOrder)
            const orderTag = xmlDoc.getElementsByTagName("verseOrder")[0];
            let orderArray = [];
            if (orderTag && orderTag.textContent) {
                // Rozbijamy np. "v1 c1 v2 c1" na tablicę
                orderArray = orderTag.textContent.toLowerCase().split(/\s+/).filter(s => s !== "");
            } else {
                // Jeśli brak verseOrder, bierzemy sekcje w kolejności występowania w pliku
                orderArray = Array.from(xmlVerses).map(v => v.getAttribute("name").toLowerCase());
            }

            // 3. Budujemy finalne listy do wyświetlania
            versesList = [];
            sectionLabelsList = [];
            
            orderArray.forEach(name => {
                if (availableSections[name]) {
                    versesList.push(availableSections[name]);
                    sectionLabelsList.push(translateSectionName(name));
                }
            });

            updateSectionDropdown();
            currentVerseIndex = 0;
            isHidden = false;
            updateUI();
            renderVerse();
        } catch (err) { 
            console.error(err);
            alert("Błąd przetwarzania pieśni."); 
        }
    }

    function translateSectionName(name) {
        if (!name) return "???";
        // Wyciągamy litery (typ), cyfry (numer) i opcjonalne litery a/b na końcu
        const match = name.match(/^([a-z]+)(\d*)([a-z]?)$/i);
        if (!match) return name;

        const prefix = match[1].toLowerCase();
        const num = match[2];
        const suffix = match[3];

        let label = sectionMap[prefix] || prefix.toUpperCase();
        let result = label;
        if (num) result += " " + num;
        if (suffix) result += suffix;
        
        return result;
    }

    function updateSectionDropdown() {
        const sel = document.getElementById('section-select');
        sel.innerHTML = '';
        sectionLabelsList.forEach((label, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = label;
            sel.appendChild(opt);
        });
    }

    function jumpToSection(index) {
        currentVerseIndex = parseInt(index);
        isHidden = false;
        updateUI();
        renderVerse();
    }

    function toggleDisplay() {
        isHidden = !isHidden;
        updateUI();
    }

    function updateUI() {
        const btn = document.getElementById('btn-toggle');
        const text = document.getElementById('verse-text');
        if (isHidden) {
            text.classList.add('hidden');
            btn.textContent = "Pokaż";
            btn.style.background = "#6c757d";
        } else {
            text.classList.remove('hidden');
            btn.textContent = "Ukryj";
            btn.style.background = "#28a745";
        }
    }

    function renderVerse() {
        const container = document.getElementById('verse-text');
        const secSelect = document.getElementById('section-select');
        if (versesList.length > 0) {
            container.innerText = versesList[currentVerseIndex];
            secSelect.value = currentVerseIndex;
        }
    }

    function handleTap(e) {
        if (versesList.length === 0) return;
        const width = window.innerWidth;
        if (e.clientX < width / 2) prevVerse();
        else nextVerse();
    }

    function nextVerse() {
        if (versesList.length === 0) return;
        currentVerseIndex = (currentVerseIndex + 1) % versesList.length;
        renderVerse();
    }

    function prevVerse() {
        if (versesList.length === 0) return;
        currentVerseIndex = (currentVerseIndex - 1 + versesList.length) % versesList.length;
        renderVerse();
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowRight') nextVerse();
        else if (e.code === 'ArrowLeft') prevVerse();
        else if (e.code === 'KeyH' || e.code === 'Escape') toggleDisplay();
    });

    init();
</script>
</body>
</html>
