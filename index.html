<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pieśni WBS</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* GÓRNY PASEK - ZREORGANIZOWANY */
        #ui-layer {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 1000;
            flex-shrink: 0;
        }

        #song-select {
            flex: 1 1 100%; /* Na komórce zajmuje całą górę */
            padding: 10px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .controls-row {
            display: flex;
            width: 100%;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 10px 12px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            flex: 0 1 auto; /* Przyciski są tak wąskie, jak ich tekst */
        }

        .btn-load { background: #28a745; }
        .btn-clear { background: #6c757d; }

        /* NOWY STYL INFO O ZWROTCE (W MENU) */
        #section-info {
            flex-grow: 1;
            background: #444;
            color: #ffca28; /* Wyraźny żółtawy kolor, by rzucał się w oczy */
            padding: 9px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            border: 1px solid #555;
            min-width: 80px;
            overflow: hidden;
            white-space: nowrap;
        }

        #display {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            overflow: hidden;
        }

        .verse {
            font-weight: 600;
            line-height: 1.3;
            white-space: pre-wrap;
            animation: fadeIn 0.2s ease-out;
            font-size: 8vh;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Optymalizacja pod telefon */
        @media (min-width: 769px) {
            #song-select { flex: 1; }
            .controls-row { width: auto; flex: 0; }
            #ui-layer { flex-wrap: nowrap; }
            #section-info { min-width: 150px; font-size: 16px; }
        }

        @media (max-width: 768px) {
            .verse { font-size: 5vh; }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <select id="song-select">
        <option value="">Ładowanie...</option>
    </select>
    <div class="controls-row">
        <button class="btn-load" onclick="loadSong()">Załaduj</button>
        <button class="btn-clear" onclick="clearDisplay()">Wyczyść</button>
        <div id="section-info">---</div>
    </div>
</div>

<div id="display" onclick="nextVerse()">
    <div id="lyrics-container">
        <div class="verse">Wybierz pieśń</div>
    </div>
</div>

<script>
    let verses = [];
    let sectionNames = [];
    let currentVerseIndex = 0;

    async function init() {
        try {
            const response = await fetch('lista.txt');
            const text = await response.text();
            const files = text.split(/\r?\n/).filter(line => line.trim() !== '');
            const select = document.getElementById('song-select');
            select.innerHTML = '<option value="">-- Wybierz z listy --</option>';
            files.forEach(fileName => {
                const option = document.createElement('option');
                option.value = 'piesni/' + fileName.trim();
                option.textContent = fileName.replace('.xml', '').replace(/_/g, ' ');
                select.appendChild(option);
            });
        } catch (err) { console.error(err); }
    }

    async function loadSong() {
        const url = document.getElementById('song-select').value;
        if (!url) return;
        try {
            const response = await fetch(url);
            const str = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(str, "text/xml");
            const xmlVerses = xmlDoc.getElementsByTagName("verse");
            
            verses = [];
            sectionNames = [];

            for (let v of xmlVerses) {
                const name = v.getAttribute("name") || "";
                const linesNode = v.getElementsByTagName("lines")[0];
                if (linesNode) {
                    let txt = "";
                    for (let node of linesNode.childNodes) {
                        if (node.nodeType === 3) txt += node.nodeValue;
                        else if (node.nodeName === "br") txt += "\n";
                    }
                    if (txt.trim()) {
                        verses.push(txt.trim());
                        sectionNames.push(translateSectionName(name));
                    }
                }
            }
            currentVerseIndex = 0;
            renderVerse();
        } catch (err) { alert("Błąd XML"); }
    }

    function translateSectionName(name) {
        if (!name) return "";
        let n = name.toLowerCase();
        if (n.startsWith('Z')) return "Zwr " + n.substring(1);
        if (n.startsWith('R')) return "Ref " + n.substring(1);
        if (n.startsWith('B')) return "Most " + n.substring(1);
        if (n.startsWith('R')) return "Pre " + n.substring(1);
        return name;
    }

    function renderVerse() {
        const container = document.getElementById('lyrics-container');
        const info = document.getElementById('section-info');
        if (verses.length > 0) {
            container.innerHTML = `<div class="verse">${verses[currentVerseIndex]}</div>`;
            info.textContent = sectionNames[currentVerseIndex];
        }
    }

    function clearDisplay() {
        document.getElementById('lyrics-container').innerHTML = '<div class="verse"> </div>';
        document.getElementById('section-info').textContent = "---";
    }

    function nextVerse() {
        if (verses.length === 0) return;
        currentVerseIndex = (currentVerseIndex + 1) % verses.length;
        renderVerse();
    }

    function prevVerse() {
        if (verses.length === 0) return;
        currentVerseIndex = (currentVerseIndex - 1 + verses.length) % verses.length;
        renderVerse();
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowRight' || e.code === 'ArrowDown') { e.preventDefault(); nextVerse(); }
        else if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') prevVerse();
        else if (e.code === 'Escape' || e.code === 'KeyB') clearDisplay();
    });

    let touchstartX = 0;
    const displayZone = document.getElementById('display');
    displayZone.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
    displayZone.addEventListener('touchend', e => {
        let touchendX = e.changedTouches[0].screenX;
        if (touchendX < touchstartX - 50) nextVerse();
        if (touchendX > touchstartX + 50) prevVerse();
    }, {passive: true});

    init();
</script>
</body>
</html>
